plugins {
    id "com.android.application"
}

android {
    namespace "tw.wajay.aitestdownloader"
    compileSdk 35

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "tw.wajay.aitestdownloader"
        minSdk 23
        targetSdk 35
        versionCode 193
        versionName "0.193.0"
        buildConfigField "String", "BUILD_DATE", "\"${new java.text.SimpleDateFormat('yyyy年MM月dd日').format(new Date())}\""
    }
}
